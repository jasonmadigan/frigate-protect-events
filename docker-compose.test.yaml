services:
  test-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: unifi-protect
      POSTGRES_USER: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "15433:5432"
    volumes:
      - ./tests/protect_schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d unifi-protect"]
      interval: 2s
      timeout: 5s
      retries: 10
